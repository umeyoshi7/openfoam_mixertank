# Vertex AI Custom Job - Solver (MRF simpleFoam + mapFields + pimpleFoam)
#
# Usage:
#   gcloud ai custom-jobs create \
#     --region=asia-northeast1 \
#     --config=vertex_ai/job_solver.yaml
#
# Edit PROJECT_ID and GCS_BUCKET before running.
# Run after the mesh generation job completes.

displayName: openfoam-solver

jobSpec:
  workerPoolSpecs:
    - machineSpec:
        machineType: n1-standard-8
      replicaCount: 1
      containerSpec:
        imageUri: asia-northeast1-docker.pkg.dev/<PROJECT_ID>/openfoam/openfoam-solver:latest
        env:
          - name: GCS_BUCKET
            value: your-openfoam-bucket
          - name: NCORES
            value: "8"
          - name: GCS_RESULT_PREFIX
            value: results
          - name: MRF_END_TIME
            value: "5000"
          # transient 計算の終了時刻 [s]
          # 1 回転 ≈ 0.6 s (ω=10.47 rad/s)。
          # 初回テスト: 2 s (≈3 回転, ~2-3 h @ 8 cores 3M cells) で動作確認。
          # 本番: 30 s (50 回転, 統計平均可能)。maxDeltaT=1e-3 + Co=0.5 で~30,000 steps。
          - name: TRANSIENT_END_TIME
            value: "2"
          # Uncomment and set to use a specific mesh path.
          # If omitted, the path is read from gs://<GCS_BUCKET>/mesh/latest.txt.
          # Example: gs://your-openfoam-bucket/mesh/mesh_20260415_120000/
          # - name: GCS_MESH_PATH
          #   value: gs://your-openfoam-bucket/mesh/mesh_<TIMESTAMP>/
