# Vertex AI Custom Job 設定ファイル
#
# 【GUI での使い方】
#   Vertex AI コンソール → Custom Jobs → 新規作成 のフォームで
#   以下のプレースホルダー値を参考に各フィールドを入力してください。
#
# 【CLI での使い方】
#   gcloud ai custom-jobs create \
#       --region=${REGION} \
#       --project=${PROJECT_ID} \
#       --display-name=openfoam-ami \
#       --config=gcp/job_config.yaml
#
# プレースホルダー (envsubst で自動展開、または手動で置換):
#   ${REGION}       : リージョン (例: asia-northeast1)
#   ${PROJECT_ID}   : GCP プロジェクト ID
#   ${AR_REPO}      : Artifact Registry リポジトリ名
#   ${IMAGE_NAME}   : Docker イメージ名
#   ${IMAGE_TAG}    : Docker イメージタグ
#   ${BUCKET}       : GCS バケット名
#   ${NCORES}       : MPI コア数
#   ${MACHINE_TYPE} : Compute Engine マシンタイプ (例: n1-standard-4)
#   ${MRF_END_TIME} : MRF 収束イテレーション数

workerPoolSpecs:
  - machineSpec:
      machineType: "${MACHINE_TYPE}"
    replicaCount: 1
    containerSpec:
      imageUri: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${IMAGE_TAG}"
      env:
        - name: GCS_BUCKET
          value: "${BUCKET}"
        - name: NCORES
          value: "${NCORES}"
        - name: GCS_RESULT_PREFIX
          value: "results"
        - name: MRF_END_TIME
          value: "${MRF_END_TIME}"

# ---------------------------------------------------------------------------
# マシンタイプ別 NCORES の目安
# ---------------------------------------------------------------------------
# n1-standard-4  : vCPU 4,  メモリ 15 GB  → NCORES=4
# n1-standard-8  : vCPU 8,  メモリ 30 GB  → NCORES=8
# n1-standard-16 : vCPU 16, メモリ 60 GB  → NCORES=16
# n1-standard-32 : vCPU 32, メモリ 120 GB → NCORES=32
# c2-standard-4  : vCPU 4,  メモリ 16 GB  → NCORES=4  (高クロック・計算向け)
# c2-standard-8  : vCPU 8,  メモリ 32 GB  → NCORES=8
